server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # This is strictly for Single Page Applications (SPA) like Vue
        # It redirects 404s to index.html so Vue Router can handle them
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache control for static assets (images, fonts, js, css)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
